spring:
  application:
    name: turnstile
  profiles:
    active: prod

app:
  redis:
    startup-check:
      enabled: true

rate-limiter:
  bucket:
    key: ${ADMISSION_BUCKET_KEY:admission}
    capacity: ${ADMISSION_BUCKET_CAPACITY:100}
    refill-token-amount: ${ADMISSION_BUCKET_REFILL_AMOUNT:100}
    refill-interval-seconds: ${ADMISSION_BUCKET_REFILL_INTERVAL_SECONDS:1}

turnstile:
  token:
    ttl-seconds: ${TURNSTILE_TOKEN_TTL_SECONDS:60}
  queue:
    dispatch-interval-millis: ${TURNSTILE_DISPATCH_INTERVAL_MILLIS:10}
    dispatch-max-batch: ${TURNSTILE_DISPATCH_MAX_BATCH:256}
    status-refresh-seconds: ${TURNSTILE_STATUS_REFRESH_SECONDS:15}
    grant-ttl-seconds: ${TURNSTILE_GRANT_TTL_SECONDS:60}

---
server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: redis
      port: 6379

---
server:
  port: 8090

spring:
  config:
    activate:
      on-profile: dev
  data:
    redis:
      host: localhost
      port: 6379
