version: '3.8'

services:
  turnstile:
    build: ./turnstile
    container_name: turnstile
    environment:
      ADMISSION_BUCKET_CAPACITY: ${ADMISSION_BUCKET_CAPACITY:-300}
      ADMISSION_BUCKET_REFILL_AMOUNT: ${ADMISSION_BUCKET_REFILL_AMOUNT:-120}
      ADMISSION_BUCKET_REFILL_INTERVAL_SECONDS: ${ADMISSION_BUCKET_REFILL_INTERVAL_SECONDS:-1}
    ports:
      - "8083:8080"
    depends_on:
      redis:
        condition: service_healthy
  gateway:
    build: ./api-gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      RATE_LIMITER_ENABLED: ${RATE_LIMITER_ENABLED:-true}
      ADMISSION_BUCKET_CAPACITY: ${ADMISSION_BUCKET_CAPACITY:-300}
      ADMISSION_BUCKET_REFILL_AMOUNT: ${ADMISSION_BUCKET_REFILL_AMOUNT:-120}
      ADMISSION_BUCKET_REFILL_INTERVAL_SECONDS: ${ADMISSION_BUCKET_REFILL_INTERVAL_SECONDS:-1}
      ADMISSION_BUCKET_REDIRECT_THRESHOLD: ${ADMISSION_BUCKET_REDIRECT_THRESHOLD:-2}
      ADMISSION_BUCKET_MAX_IN_FLIGHT_CHECKS: ${ADMISSION_BUCKET_MAX_IN_FLIGHT_CHECKS:-100}
    depends_on:
      app1:
        condition: service_started
      app2:
        condition: service_started
      redis:
        condition: service_healthy
  web-client:
    build: ./web-client
    container_name: web-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://gateway:8080
      VITE_QUEUE_PROGRESS_PER_SECOND: ${ADMISSION_BUCKET_REFILL_AMOUNT:-120}
    depends_on:
      - gateway
  app1:
    build: ./consumer-api
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/concert_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0
    restart: on-failure
  app2:
      build: ./consumer-api
      ports:
        - "8082:8080"
      depends_on:
        mysql:
          condition: service_healthy
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/concert_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0
      restart: on-failure

  mysql:
    image: mysql:8.0
    container_name: concert-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: concert_db
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
  redis:
    image: redis:8.6.0
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
