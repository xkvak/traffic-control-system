global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: spring-services
    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - "gateway:9091"
        labels:
          service: api-gateway
          replica: gateway

      - targets:
          - "turnstile:9091"
        labels:
          service: turnstile
          replica: turnstile

      - targets:
          - "app1:9091"
        labels:
          service: consumer-api
          replica: app1

      - targets:
          - "app2:9091"
        labels:
          service: consumer-api
          replica: app2